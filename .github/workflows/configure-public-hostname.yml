name: Configure public hostname

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: chatjpt-public-hostname
  cancel-in-progress: false

jobs:
  configure:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Load deploy key
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.KVM2_DEPLOY_SSH_PRIVATE_KEY }}

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o "$RUNNER_TEMP/cloudflared"
          sudo install -m 0755 "$RUNNER_TEMP/cloudflared" /usr/local/bin/cloudflared

      - name: Configure SSH through Cloudflare Tunnel
        run: |
          mkdir -p ~/.ssh
          cat >> ~/.ssh/config <<'EOF'
          Host 187.127.34.186
            User root
            ProxyCommand cloudflared access ssh --hostname ssh.devarthur.com.br
            StrictHostKeyChecking accept-new
          EOF

      - name: Configure canonical hostname
        run: |
          ssh root@187.127.34.186 '
            set -eu
            config=/etc/cloudflared/config.yml
            candidate=$(mktemp)
            backup="${config}.before-chatjpt-$(date +%Y%m%d%H%M%S)"

            cp "$config" "$backup"
            if grep -Fq "hostname: chatjpt.devarthur.com.br" "$config"; then
              cp "$config" "$candidate"
            else
              awk "/hostname: jchat.devarthur.com.br/ { print \"  - hostname: chatjpt.devarthur.com.br\"; print \"    service: http://localhost:8086\" } { print }" "$config" > "$candidate"
            fi

            cloudflared tunnel --config "$candidate" ingress validate
            route_status=0
            cloudflared tunnel route dns --overwrite-dns aad256c9-2a17-4be5-b1a2-67abbb007b50 chatjpt.devarthur.com.br || route_status=$?
            if [ "$route_status" -ne 0 ] && [ "$route_status" -ne 3 ]; then
              exit "$route_status"
            fi
            install -m 0644 "$candidate" "$config"
            systemctl restart --no-block cloudflared
            curl --fail --silent --show-error --max-time 15 -H "Host: chatjpt.devarthur.com.br" http://127.0.0.1:8086/ >/dev/null
          '

      - name: Verify public URLs
        run: |
          for attempt in $(seq 1 12); do
            if curl --fail --silent --show-error --max-time 15 https://chatjpt.devarthur.com.br/ >/dev/null; then
              break
            fi
            if [ "$attempt" = 12 ]; then
              exit 1
            fi
            sleep 5
          done
          location=$(curl --silent --show-error --max-time 15 --output /dev/null --write-out '%{redirect_url}' https://jchat.devarthur.com.br/)
          test "$location" = 'https://chatjpt.devarthur.com.br/'
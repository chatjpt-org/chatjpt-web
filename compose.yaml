services:
  web:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:8085:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - jchat

networks:
  jchat:
    external: true
